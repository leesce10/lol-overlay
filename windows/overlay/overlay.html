<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>item alert</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        -webkit-user-select: none;
      }
      #toasts {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        height: 100%;
        gap: 8px;
        padding: 8px;
        box-sizing: border-box;
      }
      .toast {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 4px 0;
        color: #eef2ff;
        white-space: nowrap;
        filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.95));
        animation: in 0.18s ease-out, out 0.4s ease-in 4.6s forwards;
      }
      .enemy-badge {
        flex: 0 0 auto;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        background: #c0392b;
        border-radius: 8px;
        padding: 4px 10px;
      }
      .toast img {
        width: 56px;
        height: 56px;
        max-width: none;
        border-radius: 8px;
        flex: 0 0 auto;
      }
      .toast img.champ {
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.4);
      }
      .toast .text {
        font-size: 20px;
        line-height: 1.25;
        white-space: nowrap;
        text-shadow: 0 1px 3px #000, 0 0 5px #000;
      }
      .toast .text b {
        color: #ffd76a;
      }
      @keyframes in {
        from {
          transform: translateY(8px);
          opacity: 0;
        }
      }
      @keyframes out {
        to {
          transform: translateY(-8px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="toasts"></div>
    <script>
      const VER = "15.7.1";
      const ITEM = (id) =>
        `https://ddragon.leagueoflegends.com/cdn/${VER}/img/item/${id}.png`;
      const CHAMP = (k) =>
        `https://ddragon.leagueoflegends.com/cdn/${VER}/img/champion/${k}.png`;
      const toasts = document.getElementById("toasts");

      function showToast({ championKey, itemName, itemID, ver }) {
        const v = ver || VER;
        const itemUrl = `https://ddragon.leagueoflegends.com/cdn/${v}/img/item/${itemID}.png`;
        const champUrl = championKey
          ? `https://ddragon.leagueoflegends.com/cdn/${v}/img/champion/${championKey}.png`
          : "";
        const el = document.createElement("div");
        el.className = "toast";
        const badge = document.createElement("span");
        badge.className = "enemy-badge";
        badge.textContent = "적";
        const champImg = document.createElement("img");
        champImg.className = "champ";
        if (championKey) champImg.src = champUrl;
        champImg.onerror = () => (champImg.style.display = "none");
        const itemImg = document.createElement("img");
        itemImg.className = "item";
        itemImg.src = itemUrl;
        itemImg.onerror = () => (itemImg.style.visibility = "hidden");
        const text = document.createElement("div");
        text.className = "text";
        text.innerHTML = `<b>${itemName}</b> 구매`;
        el.appendChild(badge);
        el.appendChild(champImg);
        el.appendChild(itemImg);
        el.appendChild(text);
        toasts.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }

      function showStatus(s) {
        let el = document.getElementById("dbg");
        if (!el) {
          el = document.createElement("div");
          el.id = "dbg";
          el.style.cssText =
            "position:fixed;top:2px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#9f9;font:13px monospace;padding:4px 10px;border-radius:6px;max-width:92vw;text-align:center;line-height:1.5;z-index:9";
          document.body.appendChild(el);
        }
        el.innerHTML =
          `feat:${s.feat} upd:${s.upd} lcd:${s.lcd} ply:${s.ply} ev:${s.ev} deaths:${s.deaths} me:${s.me}` +
          `<br>infoKeys:${s.infoKeys}` +
          `<br>lcdKeys:${s.keys}`;
      }

      function handle(id, content) {
        if (id === "new-item" && content) showToast(content);
        else if (id === "debug-status" && content) showStatus(content);
        else if (id === "reset") toasts.innerHTML = ""; // 새 게임: 토스트 비움
      }
      if (typeof overwolf !== "undefined") {
        overwolf.windows.onMessageReceived.addListener((msg) =>
          handle(msg.id, msg.content)
        );
      } else {
        window.addEventListener("message", (e) => {
          const d = e.data || {};
          handle(d.id, d.content);
        });
        if (location.search.includes("bg"))
          document.body.style.background = "#2b2f3a";
        if (location.search.includes("demo"))
          showToast({
            championKey: "Zed",
            itemName: "존야의 모래시계",
            itemID: 3157,
          });
      }
    </script>
  </body>
</html>
