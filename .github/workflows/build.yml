name: Build installers (Win + Mac)

# 수동 실행(Run workflow 버튼) 또는 v* 태그 푸시 시 .exe/.dmg 빌드 → Release 발행
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # Release 생성/업데이트에 필요

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: electron
        run: npm ci

      # 버전을 빌드 번호로 올림 → electron-updater가 새 버전 감지
      - name: Set version 0.1.${{ github.run_number }}
        working-directory: electron
        shell: bash
        run: node -e "const fs=require('fs'),p=require('./package.json');p.version='0.1.${{ github.run_number }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"

      # electron-builder가 .exe + latest.yml + blockmap을 GitHub Release(v<version>)에 게시
      - name: Build & publish (.exe + 업데이트 메타)
        working-directory: electron
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: build # Windows job이 먼저 Release(v<version>)를 만든 뒤 .dmg를 같은 Release에 추가
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: electron
        run: npm ci
      - name: Set version 0.1.${{ github.run_number }}
        working-directory: electron
        shell: bash
        run: node -e "const fs=require('fs'),p=require('./package.json');p.version='0.1.${{ github.run_number }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
      # 유니버설(.dmg, 인텔+애플실리콘)을 같은 v<version> Release에 게시
      - name: Build & publish (.dmg)
        working-directory: electron
        run: npm run dist:mac -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
